model:
  gnn_type: "NRI"
  # encoder
  encoder_hidden: 256
  encoder_dropout: 0.5
  factor: true
  # decoder
  decoder_hidden: 256
  decoder_dropout: 0.5
  skip_first: false
  # graph structure — must match the dataset
  num_atoms: 8            # number of nodes
  dims: 3                 # node feature dim (graph.x.shape[1])
  edge_types: 2           # 1=no edge, 2=edge/no-edge
  # gumbel softmax
  temp: 0.5
  hard: false
  # trajectory window
  timesteps: 49           # frames fed to encoder (determines n_in = timesteps * dims)

training:
  lr: 0.0001
  batch_size: 32
  epochs: 300
  test_split: 0.2
  val_split: 0.1
  gt_edges: false
  validate_with_rollout: false
  kl_weight: 1.0          # weight on KL divergence in ELBO loss